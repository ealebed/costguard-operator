---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: budgetnamespaces.finops.ealebed.github.io
spec:
  group: finops.ealebed.github.io
  names:
    kind: BudgetNamespace
    listKind: BudgetNamespaceList
    plural: budgetnamespaces
    singular: budgetnamespace
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BudgetNamespace is the Schema for the budgetnamespaces API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of BudgetNamespace
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: annotations are applied to the managed namespace.
                type: object
              costBudget:
                description: |-
                  costBudget optionally evaluates billed USD from BigQuery and triggers the same enforcement as ResourceQuota breaches.
                  Requires the operator to run with credentials that can query the billing export table (for example GKE Workload Identity).
                properties:
                  billingExportTable:
                    description: 'billingExportTable is a fully-qualified table ID:
                      project.dataset.table (detailed billing export with resource
                      labels).'
                    minLength: 1
                    type: string
                  clusterName:
                    description: clusterName is the value of the goog-k8s-cluster-name
                      label on billing rows (GKE cluster name).
                    minLength: 1
                    type: string
                  enabled:
                    default: false
                    description: enabled turns on periodic BigQuery spend checks for
                      the managed namespace.
                    type: boolean
                  lookbackWindow:
                    description: lookbackWindow is a Go duration (e.g. 168h, 24h)
                      for billing usage_start_time filtering. Empty defaults to 168h.
                    type: string
                  maxSpendUSD:
                    description: |-
                      maxSpendUSD is a decimal threshold in USD (e.g. "1" or "1.50"). When SUM(cost) in the lookback window is at or above
                      this value, non-exempt Deployments and StatefulSets are scaled to zero (if enforcement is enabled).
                    minLength: 1
                    type: string
                  queryInterval:
                    description: queryInterval is the minimum time between BigQuery
                      queries for this resource (e.g. 1h). Empty defaults to 1h.
                    type: string
                type: object
              defaults:
                description: defaults defines default requests and limits for containers
                  in the managed namespace.
                properties:
                  limitCPU:
                    minLength: 1
                    type: string
                  limitMemory:
                    minLength: 1
                    type: string
                  requestCPU:
                    minLength: 1
                    type: string
                  requestMemory:
                    minLength: 1
                    type: string
                required:
                - limitCPU
                - limitMemory
                - requestCPU
                - requestMemory
                type: object
              enforcement:
                description: enforcement defines how budget violations are handled.
                properties:
                  action:
                    default: ScaleToZero
                    enum:
                    - None
                    - ScaleToZero
                    type: string
                  enabled:
                    default: true
                    type: boolean
                  enforcementCooldown:
                    description: |-
                      enforcementCooldown is a Go duration (e.g. 2m, 30s) to wait after scale-to-zero before allowing restore.
                      Empty defaults to 2m.
                    type: string
                  restoreOnRecovery:
                    default: false
                    description: |-
                      restoreOnRecovery when true restores Deployments and StatefulSets from finops.ealebed.github.io/pre-scale-replicas
                      after ResourceQuota usage is below hard limits and (when costBudget is enabled) observed spend is below maxSpendUSD,
                      waiting enforcementCooldown after a scale-to-zero.
                    type: boolean
                type: object
              labels:
                additionalProperties:
                  type: string
                description: labels are applied to the managed namespace.
                type: object
              namespaceName:
                description: namespaceName is the namespace managed by this BudgetNamespace
                  resource.
                minLength: 1
                type: string
              quota:
                description: quota defines ResourceQuota limits for the managed namespace.
                properties:
                  cpu:
                    minLength: 1
                    type: string
                  memory:
                    minLength: 1
                    type: string
                  persistentVolumeClaims:
                    format: int32
                    minimum: 1
                    type: integer
                  pods:
                    format: int32
                    minimum: 1
                    type: integer
                  storage:
                    minLength: 1
                    type: string
                required:
                - cpu
                - memory
                - persistentVolumeClaims
                - pods
                - storage
                type: object
              ttl:
                description: ttl defines how long the managed namespace may live,
                  for example 72h.
                minLength: 1
                type: string
            required:
            - defaults
            - namespaceName
            - quota
            type: object
          status:
            description: status defines the observed state of BudgetNamespace
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the BudgetNamespace resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              expiresAt:
                description: expiresAt is the computed expiry timestamp derived from
                  spec.ttl.
                format: date-time
                type: string
              lastCostQueryAt:
                description: lastCostQueryAt is when the controller last queried BigQuery
                  for cost budget evaluation.
                format: date-time
                type: string
              lastEnforcementAt:
                description: lastEnforcementAt records the last time enforcement scaled
                  Deployments up or down.
                format: date-time
                type: string
              lastEnforcementOperation:
                description: lastEnforcementOperation is ScaleToZero or Restore; meaningful
                  when lastEnforcementAt is set.
                enum:
                - ScaleToZero
                - Restore
                type: string
              lastObservedSpendUSD:
                description: lastObservedSpendUSD is the total USD from the last successful
                  BigQuery cost query for this BudgetNamespace.
                type: string
              managedNamespace:
                description: managedNamespace is the namespace currently managed for
                  this resource.
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation reconciled
                  by the controller.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
