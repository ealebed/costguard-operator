# This rule is not used by the project costguard-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over finops.ealebed.github.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: costguard-operator
    app.kubernetes.io/managed-by: kustomize
  name: budgetnamespace-admin-role
rules:
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces
  verbs:
  - '*'
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces/status
  verbs:
  - get
