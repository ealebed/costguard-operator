# This rule is not used by the project costguard-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the finops.ealebed.github.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: costguard-operator
    app.kubernetes.io/managed-by: kustomize
  name: budgetnamespace-editor-role
rules:
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces/status
  verbs:
  - get
