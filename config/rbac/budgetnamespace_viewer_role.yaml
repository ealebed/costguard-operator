# This rule is not used by the project costguard-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to finops.ealebed.github.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: costguard-operator
    app.kubernetes.io/managed-by: kustomize
  name: budgetnamespace-viewer-role
rules:
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces/status
  verbs:
  - get
