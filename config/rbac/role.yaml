---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces/finalizers
  verbs:
  - update
- apiGroups:
  - finops.ealebed.github.io
  resources:
  - budgetnamespaces/status
  verbs:
  - get
  - patch
  - update
