apiVersion: finops.ealebed.github.io/v1alpha1
kind: BudgetNamespace
metadata:
  labels:
    app.kubernetes.io/name: costguard-operator
    app.kubernetes.io/managed-by: kustomize
  name: budgetnamespace-sample
spec:
  namespaceName: demo-budget-ns
  labels:
    ealebed.github.io/team: platform
    ealebed.github.io/env: dev
    ealebed.github.io/cost-center: sandbox
  annotations:
    ealebed.github.io/owner: ealebed
  quota:
    cpu: "2"
    memory: "4Gi"
    storage: "20Gi"
    persistentVolumeClaims: 5
    pods: 10
  defaults:
    requestCPU: "100m"
    requestMemory: "128Mi"
    limitCPU: "500m"
    limitMemory: "512Mi"
  ttl: 72h
  enforcement:
    enabled: true
    action: ScaleToZero
